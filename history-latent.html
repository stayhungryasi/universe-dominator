/* 라이트 / 다크 테마 변수는 메인과 동일 */
:root, [data-theme="light"] {
  --bg: #FAF6EC; --bg-card: #FFFFFF;
  --text: #1A2438; --text-secondary: #525F7E;
  --text-muted: #8590AA;
  --gold: #9C7A3A; --gold-bg: #F0E6CC;
  --line: #E8DFC9; --line-strong: #C9BC9A;
  --up: #16A085; --down: #C0392B;
}
[data-theme="dark"] {
  --bg: #0A0E14; --bg-card: #1C2330;
  --text: #FFFFFF; --text-secondary: #B5BFD6;
  --text-muted: #6F7E9E;
  --gold: #D4A658; --gold-bg: #2A2519;
  --line: #2A3142; --line-strong: #3A4458;
  --up: #2ECC71; --down: #E74C3C;

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Pretendard Variable', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-feature-settings: 'tnum', 'ss01';
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}

.container { max-width: 880px; margin: 0 auto; padding: 0 20px; }

/* 헤더 */
.site-header { padding: 16px 0; border-bottom: 1px solid var(--line); background: var(--header-bg, var(--bg)); }

/* 상단 네비게이션 */
.site-nav {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
}
.site-nav-inner { display: flex; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
.site-nav-inner::-webkit-scrollbar { display: none; }
.nav-tab {
  flex-shrink: 0; padding: 14px 18px;
  font-size: 14px; font-weight: 700; letter-spacing: -0.01em;
  color: var(--text-muted); text-decoration: none;
  border-bottom: 2px solid transparent;
  transition: all 0.2s; white-space: nowrap;
}
.nav-tab:hover { color: var(--text-secondary); }
.nav-tab.active { color: var(--text); border-bottom-color: var(--gold); }
@media (max-width: 480px) { .nav-tab { padding: 12px 14px; font-size: 13px; } }
.site-header-inner { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.brand { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 800; letter-spacing: -0.01em; color: var(--text); }
.brand-star { color: var(--gold); }
.brand-tag { font-size: 13px; font-weight: 500; color: var(--text-muted); }
.brand a { text-decoration: none; color: inherit; }

.header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.update-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; background: var(--gold-bg);
  border-radius: 100px; font-size: 12px; font-weight: 700;
  color: var(--gold); font-variant-numeric: tabular-nums;
}
[data-theme="dark"] .update-badge { border: 1px solid rgba(212,166,88,0.3); }
.update-badge::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold); animation: pulse 2s ease-in-out infinite;
}
[data-theme="dark"] .update-badge::before { box-shadow: 0 0 8px var(--gold); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.rate-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 12px; background: var(--bg-card);
  border: 1px solid var(--line); border-radius: 100px;
  font-size: 12px; font-weight: 700; color: var(--text-secondary);
  font-variant-numeric: tabular-nums; letter-spacing: 0.01em;
  white-space: nowrap; text-decoration: none; cursor: pointer;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}
.rate-badge:hover { border-color: var(--gold); }
.rate-badge:hover #usdKrwDisplay, .rate-badge:hover .rate-badge-arrow { color: var(--gold); }
.rate-badge-arrow { font-size: 10px; margin-left: 2px; color: var(--text-muted); opacity: 0.7; transition: color 0.2s, opacity 0.2s; }
.rate-badge:hover .rate-badge-arrow { opacity: 1; }
.rate-badge #usdKrwDisplay { color: var(--text); font-weight: 800; }
@media (max-width: 480px) { .rate-badge { font-size: 11px; padding: 5px 10px; } .update-badge { font-size: 11px; padding: 5px 10px; } }
@media (max-width: 380px) { .update-badge::before { display: none; } }


.back-btn {

  gap: 5px;
  padding: 7px 14px;
  background: var(--bg-card);
  border: 1px solid var(--line);

.back-btn:hover { border-color: var(--gold); color: var(--gold); }

.theme-toggle {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--line);
  background: var(--bg-card);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  color: var(--text-secondary);

.theme-toggle::before { content: "🌙"; }
[data-theme="dark"] .theme-toggle::before { content: "☀️"; }

/* 페이지 헤딩 */
.page-hero { padding: 40px 0 28px; }
.page-eyebrow {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.2em;

  color: var(--gold);
  margin-bottom: 8px;

.page-title {

  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--text);

}
.page-desc {

  font-weight: 500;
  color: var(--text-muted);
  max-width: 600px;

/* 타임라인 */
.timeline { padding: 12px 0 60px; }

.entry {
  position: relative;
  padding: 28px 0 28px 28px;
  border-left: 2px solid var(--line);
}
.entry::before {
  content: "";
  position: absolute;
  left: -7px;
  top: 36px;
  width: 12px;
  height: 12px;
  background: var(--bg);
  border: 2px solid var(--gold);
  border-radius: 50%;
}
.entry:first-child::before {
  background: var(--gold);
}

.entry-date {
  font-size: 13px;
  font-weight: 800;
  color: var(--gold);
  letter-spacing: 0.04em;
  font-variant-numeric: tabular-nums;
  margin-bottom: 4px;
}
.entry-auto-badge {
  display: inline-block;
  margin-left: 8px;
  padding: 2px 7px;
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 100px;
  vertical-align: middle;
}
.entry-period {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  margin-bottom: 16px;
}

.entry-block { margin-top: 18px; }
.entry-block:first-of-type { margin-top: 14px; }

.entry-block-label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 8px;

.entry-items {

  padding: 0;
  margin: 0;
  font-size: 14px;
  line-height: 1.75;
  color: var(--text);
  font-weight: 500;
}
.entry-items li {
  padding-left: 14px;
  position: relative;
  margin-bottom: 4px;
}
.entry-items li::before {
  content: "•";
  position: absolute;
  left: 0;
  color: var(--gold);
  opacity: 0.7;
}
.entry-items li strong {
  color: var(--text);
  font-weight: 700;
}
.entry-items .em-up { color: var(--up); font-weight: 700; }
.entry-items .em-down { color: var(--down); font-weight: 700; }

.entry-prose {
  font-size: 13.5px;
  line-height: 1.75;
  color: var(--text-secondary);
  font-weight: 500;
}

.entry-stat-row {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  font-size: 13px;
  color: var(--text-secondary);
}
.entry-stat-label {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 700;
  letter-spacing: 0.02em;
  margin-right: 4px;

.entry-stat-val {
  color: var(--text);
  font-weight: 700;

/* 빈 상태 */

  color: var(--text-muted);

/* 푸터 */

<script>
document.addEventListener('DOMContentLoaded', function () {
  var badge = document.querySelector('.update-badge');
  if (!badge) return;
  badge.innerHTML = '<span class="ud-date"></span><span class="ud-clock"></span>';
  var dt = badge.querySelector('.ud-date');
  var clk = badge.querySelector('.ud-clock');
  function tick() {
    var now = new Date();
    dt.textContent = now.toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' }).replace(/-/g, '.');
    clk.textContent = now.toLocaleTimeString('en-GB', { hour12: false, timeZone: 'Asia/Seoul' });
  }
  tick();
  setInterval(tick, 1000);
});
</script>

  if (re && m.usd_krw != null) re.textContent = Number(m.usd_krw).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});

const timeline = document.getElementById('timeline');

function renderBlock(block) {
  if (!block) return '';
  if (block.type === 'items') {
    return `
      <div class="entry-block">
        <div class="entry-block-label">${block.label || ''}</div>
        <ul class="entry-items">
          ${block.items.map(it => `<li>${it}</li>`).join('')}
        </ul>
      </div>`;
  }
  if (block.type === 'prose') {
    return `
      <div class="entry-block">
        ${block.label ? `<div class="entry-block-label">${block.label}</div>` : ''}
        <p class="entry-prose">${block.text}</p>
      </div>`;
  }
  if (block.type === 'stats') {
    return `
      <div class="entry-block">
        ${block.label ? `<div class="entry-block-label">${block.label}</div>` : ''}
        <div class="entry-stat-row">
          ${block.items.map(it => `
            <div><span class="entry-stat-label">${it.k}</span><span class="entry-stat-val">${it.v}</span></div>
          `).join('')}
        </div>
      </div>`;
  }
  return '';
}

if (DATA.entries && DATA.entries.length > 0) {
  timeline.innerHTML = DATA.entries.map(e => `
    <div class="entry">
      <div class="entry-date">${e.date || ''}${e.auto ? '<span class="entry-auto-badge">자동</span>' : ''}</div>
      ${e.period ? `<div class="entry-period">${e.period}</div>` : ''}
      ${(e.blocks || []).map(renderBlock).join('')}

  `).join('');
} else {
