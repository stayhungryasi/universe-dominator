name: Daily Universe Dominator Update

on:
  schedule:
    # 정각은 GitHub 부하로 자주 건너뜀 → 정각 회피, 하루 3회 (아침·점심·저녁)
    # ※ GitHub 예약은 best-effort라 불안정 — 확실한 실행은 외부 스케줄러(cron-job.org)가 담당
    - cron: '17 23 * * *'   # 08:17 KST (다음날)
    - cron: '17 3 * * *'    # 12:17 KST
    - cron: '17 9 * * *'    # 18:17 KST
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Fetch latest market cap data (+ daily snapshot)
        run: python scripts/fetch_data.py
        continue-on-error: false
      
      # 잠재지배자 후보 자동 생성 (완전 자동)
      # ⚠️ 첫 출시: --preview = 사이트 미반영, data/latent_auto_preview.json 만 생성.
      #    결과 확인 후 아래 --preview 를 지우면 라이브(latest.json 직접 갱신).
      # 실패해도 파이프라인 중단 안 됨(continue-on-error) → latent 기존값 유지.
      - name: Generate latent candidates (auto)
        run: python scripts/generate_candidates.py
        continue-on-error: true

      # 종목 리서치·분석 기사 자동 수집 (Google News RSS)
      # 실패해도 파이프라인 중단 안 됨 → 기존 research.json 유지
      - name: Fetch research articles (auto)
        run: python scripts/fetch_research.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      # 시장 주요일정 수집 (FOMC 고정 + Finnhub 실적 + 뉴스 이벤트)
      - name: Fetch market calendar (auto)
        run: python scripts/fetch_calendar.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        continue-on-error: true
      
      # 거인의 어깨 — 투자 거인 13F 포트폴리오 (SEC EDGAR, 키 불필요)
      # 실패해도 파이프라인 중단 안 됨 → 기존 gurus.json 유지
      - name: Fetch guru portfolios (13F)
        run: python scripts/fetch_gurus.py
        continue-on-error: true

      # 토요일(KST)에만 주간 History 자동 생성
      # cron이 23:00 UTC = 다음날 08:00 KST 이므로,
      # 금요일 23:00 UTC 실행분이 토요일 08:00 KST가 됨 → KST 요일로 판정
      - name: Weekly history (Saturdays KST only)
        run: |
          DOW=$(TZ='Asia/Seoul' date +%u)   # 1=월 ... 6=토, 7=일
          if [ "$DOW" -eq 6 ]; then
            echo "토요일 — 주간 History 생성"
            python scripts/weekly_history.py
          else
            echo "토요일 아님 (요일=$DOW) — 주간 History 건너뜀"
          fi
      
      - name: Build all site pages
        run: python scripts/build_site.py
      
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "Auto update: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
            # 동시 실행 충돌 대비: 최대 3회 rebase 후 push 재시도
            for i in 1 2 3; do
              if git push; then
                echo "push 성공"
                break
              fi
              echo "push 거부 — 원격 변경 반영 후 재시도 ($i/3)"
              git pull --rebase origin main || git rebase --abort
              sleep $((i * 3))
            done
          fi
