  badge.innerHTML = '<span class="ud-date"></span><span class="ud-clock"></span>';
  var dt = badge.querySelector('.ud-date');
  var clk = badge.querySelector('.ud-clock');
  function tick() {
    var now = new Date();
    dt.textContent = now.toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' }).replace(/-/g, '.');
    clk.textContent = now.toLocaleTimeString('en-GB', { hour12: false, timeZone: 'Asia/Seoul' });

  tick();
  setInterval(tick, 1000);
});

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(group) {
  const list = document.getElementById('list');
  const stocks = (DATA.stocks || []).filter(s => s.group === group);
  if (!stocks.length) {
    list.innerHTML = '<div class="no-art">수집된 리서치가 아직 없습니다 — 다음 자동 갱신을 기다려 주세요.</div>';
    return;
  }
  list.innerHTML = stocks.map(s => {
    const arts = (s.articles || []).map(a => {
      const hasKo = a.title_ko && a.title_ko !== a.title;
      const bullets = (a.summary_ko || []).map(b => '<li>' + esc(b) + '</li>').join('');
      return '<a class="art" href="' + esc(a.link) + '" target="_blank" rel="noopener">' +
        '<div class="art-title">' + esc(hasKo ? a.title_ko : a.title) + '</div>' +
        (hasKo ? '<div class="art-orig">' + esc(a.title) + '</div>' : '') +
        (bullets ? '<ul class="art-summary">' + bullets + '</ul>' : '') +
        '<div class="art-meta">' + esc(a.source) + (a.date_label ? ' · ' + esc(a.date_label) : '') + '</div>' +
      '</a>';
    }).join('');
    return '<div class="stock-block">' +
      '<div class="stock-head">' +
        (s.rank ? '<span class="stock-rank">' + esc(s.rank) + '위</span>' : '') +
        '<span class="stock-name">' + esc(s.name) + '</span>' +
        '<span class="stock-ticker">' + esc(s.ticker) + '</span>' +
      '</div>' +
      (arts || '<div class="no-art">최근 2주 내 수집된 기사 없음</div>') +
    '</div>';
  }).join('');
}

function renderCalendar() {
  const list = document.getElementById('list');
  const evs = (DATA.calendar && DATA.calendar.events) || [];
  if (!evs.length) {
    list.innerHTML = '<div class="no-art">수집된 일정이 아직 없습니다 — 다음 자동 갱신을 기다려 주세요.</div>';
    return;
  }
  const today = new Date(new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' }));
  const typeLabel = { macro: 'FOMC·매크로', earnings: '실적 발표', event: '이벤트' };
  list.innerHTML = evs.map(e => {
    const d = new Date(e.date);
    const diff = Math.round((d - today) / 86400000);
    const dday = diff === 0 ? 'TODAY' : (diff > 0 ? 'D-' + diff : 'D+' + Math.abs(diff));
    const md = (d.getMonth() + 1) + '/' + d.getDate();
    return '<div class="cal-item">' +
      '<div class="cal-date"><div class="d">' + md + '</div>' +
      '<span class="dday' + (diff === 0 ? ' today' : '') + '">' + dday + '</span></div>' +
      '<div class="cal-body"><div class="cal-title">' + esc(e.title) + '</div>' +
      '<span class="cal-type ' + esc(e.type || '') + '">' + (typeLabel[e.type] || '일정') + '</span></div>' +
    '</div>';
  }).join('');
}

function renderGurus() {
  const list = document.getElementById('list');
  const gs = (DATA.gurus && DATA.gurus.gurus) || [];
  if (!gs.length) {
    list.innerHTML = '<div class="no-art">거인 포트폴리오가 아직 수집되지 않았습니다 — 다음 자동 갱신을 기다려 주세요.</div>';
    return;
  }
  const note = '<div class="guru-note">SEC 13F 공시 기준 — 분기 1회 · 최대 45일 지연 공시 · 미국 상장 롱포지션만 포함됩니다. ' +
    '실제 현재 보유와 다를 수 있으며, 투자 권유가 아닙니다.' +
    (DATA.gurus.generated_label ? ' <span style="white-space:nowrap">(수집: ' + esc(DATA.gurus.generated_label) + ' KST)</span>' : '') + '</div>';
  list.innerHTML = note + gs.map((g, gi) => {
    const rows = (g.holdings || []).map((h, i) => {
      let cls = '', txt = h.chg || '―';
      if (txt === 'NEW') { cls = 'new'; txt = '신규'; }
      else if (txt.startsWith('+')) cls = 'up';
      else if (txt.startsWith('-')) cls = 'down';
      const bw = Math.min(100, (h.pct / (g.holdings[0].pct || 1)) * 100);
      return '<div class="guru-row">' +
        '<span class="guru-rank">' + (i + 1) + '</span>' +
        '<span class="guru-issuer">' + esc(h.name) + '</span>' +
        '<span class="guru-bar-wrap"><span class="guru-bar" style="width:' + bw + '%"></span></span>' +
        '<span class="guru-pct">' + h.pct + '%</span>' +
        '<span class="guru-chg ' + cls + '">' + esc(txt) + '</span>' +
      '</div>';
    }).join('');
    const exits = (g.exits && g.exits.length)
      ? '<div class="guru-exits"><b>전량 매도:</b> ' + g.exits.map(esc).join(' · ') + '</div>' : '';
    return '<div class="guru-block" id="guru-' + gi + '" onclick="toggleGuru(' + gi + ')">' +
      '<div class="guru-head"><span class="guru-name">' + esc(g.name_ko) + '</span>' +
      '<span class="guru-person">' + esc(g.person) + '</span>' +
      '<span class="guru-toggle">▼</span></div>' +
      '<div class="guru-tagline">' + esc(g.tagline) + '</div>' +
      '<div class="guru-body">' +
        '<div class="guru-meta">' + esc(g.period_label) + ' 보고 (공시 ' + esc(g.filed) + ') · 운용 $' +
          Number(g.total_b).toLocaleString() + 'B · ' + g.positions + '종목 중 TOP ' + (g.holdings || []).length +
          ' · 지분 증감은 전분기 대비</div>' +
        rows + exits +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleGuru(gi) {
  const el = document.getElementById('guru-' + gi);
  const wasOpen = el.classList.contains('open');
  document.querySelectorAll('.guru-block.open').forEach(b => b.classList.remove('open'));
  if (!wasOpen) { el.classList.add('open'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

function setGroup(g, btn) {
  document.querySelectorAll('.group-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (g === 'calendar') renderCalendar(); else if (g === 'gurus') renderGurus(); else render(g);
}

document.addEventListener('DOMContentLoaded', function () {
  if (DATA.generated_label) {
    document.getElementById('genLabel').textContent = '마지막 수집: ' + DATA.generated_label + ' KST';
  }
  render('universe');
});
</script>
</body>
</html>
