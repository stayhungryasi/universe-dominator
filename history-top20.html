:root, [data-theme="light"] {

  --text: #1A2438; --text-secondary: #525F7E;
  --text-muted: #8590AA;
  --gold: #9C7A3A; --gold-bg: #F0E6CC;
  --line: #E8DFC9; --line-strong: #C9BC9A;
  --up: #16A085; --down: #C0392B;
}
[data-theme="dark"] {
  --bg: #0A0E14; --bg-card: #1C2330;
  --text: #FFFFFF; --text-secondary: #B5BFD6;
  --text-muted: #6F7E9E;
  --gold: #D4A658; --gold-bg: #2A2519;
  --line: #2A3142; --line-strong: #3A4458;

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Pretendard Variable', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-feature-settings: 'tnum', 'ss01';
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}

.container { max-width: 880px; margin: 0 auto; padding: 0 20px; }

/* 헤더 */
.site-header { padding: 16px 0; border-bottom: 1px solid var(--line); background: var(--header-bg, var(--bg)); }

/* 상단 네비게이션 */
.site-nav {
  position: sticky; top: 0; z-index: 50;

.site-nav-inner { display: flex; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
.site-nav-inner::-webkit-scrollbar { display: none; }
.nav-tab {

  border-bottom: 2px solid transparent;
  transition: all 0.2s; white-space: nowrap;
}
.nav-tab:hover { color: var(--text-secondary); }
.nav-tab.active { color: var(--text); border-bottom-color: var(--gold); }
@media (max-width: 480px) { .nav-tab { padding: 12px 14px; font-size: 13px; } }
.site-header-inner { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.brand { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 800; letter-spacing: -0.01em; color: var(--text); }
.brand-star { color: var(--gold); }
.brand-tag { font-size: 13px; font-weight: 500; color: var(--text-muted); }
.brand a { text-decoration: none; color: inherit; }

.header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.update-badge {
  display: inline-flex; align-items: center; gap: 6px;

  border-radius: 100px; font-size: 12px; font-weight: 700;
  color: var(--gold); font-variant-numeric: tabular-nums;
}
[data-theme="dark"] .update-badge { border: 1px solid rgba(212,166,88,0.3); }
.update-badge::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold); animation: pulse 2s ease-in-out infinite;
}
[data-theme="dark"] .update-badge::before { box-shadow: 0 0 8px var(--gold); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.rate-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 12px; background: var(--bg-card);
  border: 1px solid var(--line); border-radius: 100px;
  font-size: 12px; font-weight: 700; color: var(--text-secondary);
  font-variant-numeric: tabular-nums; letter-spacing: 0.01em;
  white-space: nowrap; text-decoration: none; cursor: pointer;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}
.rate-badge:hover { border-color: var(--gold); }
.rate-badge:hover #usdKrwDisplay, .rate-badge:hover .rate-badge-arrow { color: var(--gold); }
.rate-badge-arrow { font-size: 10px; margin-left: 2px; color: var(--text-muted); opacity: 0.7; transition: color 0.2s, opacity 0.2s; }
.rate-badge:hover .rate-badge-arrow { opacity: 1; }
.rate-badge #usdKrwDisplay { color: var(--text); font-weight: 800; }
@media (max-width: 480px) { .rate-badge { font-size: 11px; padding: 5px 10px; } .update-badge { font-size: 11px; padding: 5px 10px; } }
@media (max-width: 380px) { .update-badge::before { display: none; } }


.back-btn {

.theme-toggle {

  border: 1px solid var(--line);
  background: var(--bg-card);

  display: flex; align-items: center; justify-content: center;

  color: var(--text-secondary);

.theme-toggle::before { content: "🌙"; }
[data-theme="dark"] .theme-toggle::before { content: "☀️"; }

/* 페이지 헤딩 */

.page-eyebrow {

.page-desc {

/* 타임라인 */
.timeline { padding: 12px 0 60px; }

.entry {
  position: relative;
  padding: 28px 0 28px 28px;
  border-left: 2px solid var(--line);
}
.entry::before {
  content: "";
  position: absolute;
  left: -7px;
  top: 36px;
  width: 12px;
  height: 12px;
  background: var(--bg);
  border: 2px solid var(--gold);
  border-radius: 50%;
}
.entry:first-child::before {
  background: var(--gold);
}

.entry-date {
  font-size: 13px;
  font-weight: 800;
  color: var(--gold);
  letter-spacing: 0.04em;
  font-variant-numeric: tabular-nums;
  margin-bottom: 4px;

.entry-auto-badge {

  margin-left: 8px;
  padding: 2px 7px;
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 100px;
  vertical-align: middle;

.entry-period {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.04em;

.entry-block { margin-top: 18px; }

.entry-block-label {
  font-size: 10px;

.entry-items {

  line-height: 1.75;

.entry-items li {

  position: relative;
  margin-bottom: 4px;
}
.entry-items li::before {
  content: "•";
  position: absolute;
  left: 0;
  color: var(--gold);
  opacity: 0.7;
}
.entry-items li strong {
  color: var(--text);
  font-weight: 700;

.entry-items .em-up { color: var(--up); font-weight: 700; }
.entry-items .em-down { color: var(--down); font-weight: 700; }

.entry-prose {

  color: var(--text-secondary);
  font-weight: 500;

.entry-stat-row {

  color: var(--text-secondary);

.entry-stat-label {

<script>
document.addEventListener('DOMContentLoaded', function () {
  var badge = document.querySelector('.update-badge');
  if (!badge) return;
  badge.innerHTML = '<span class="ud-date"></span><span class="ud-clock"></span>';
  var dt = badge.querySelector('.ud-date');
  var clk = badge.querySelector('.ud-clock');
  function tick() {
    var now = new Date();
    dt.textContent = now.toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' }).replace(/-/g, '.');
    clk.textContent = now.toLocaleTimeString('en-GB', { hour12: false, timeZone: 'Asia/Seoul' });
  }
  tick();
  setInterval(tick, 1000);
});
</script>

<!-- uv-presence -->
<script type="module">
(async () => {
  try {
    const cfg = await (await fetch('data/firebase_config.json?v=' + Date.now())).json();
    if (!cfg || !cfg.apiKey) return;
    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
    const { getFirestore, doc, setDoc, collection, query, where, Timestamp, serverTimestamp, getCountFromServer } =
      await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
    const db = getFirestore(initializeApp(cfg, 'presence'));

    let pid = localStorage.getItem('uv_pid');
    if (!pid) { pid = 'p' + Math.random().toString(36).slice(2, 12) + Date.now().toString(36); localStorage.setItem('uv_pid', pid); }

    const beat = () => setDoc(doc(db, 'presence', pid), { t: serverTimestamp() }).catch(() => {});
    const count = async () => {
      try {
        const cutoff = Timestamp.fromMillis(Date.now() - 2 * 60 * 1000);
        const snap = await getCountFromServer(query(collection(db, 'presence'), where('t', '>', cutoff)));
        const n = snap.data().count;
        if (n > 0) {
          let el = document.getElementById('uvPresence');
          if (!el) {
            const ft = document.querySelector('.site-footer') || document.querySelector('footer');
            if (!ft) return;
            el = document.createElement('div');
            el.id = 'uvPresence';
            el.style.cssText = 'margin-top:8px;font-size:12px;color:var(--text-muted,#8a8577);';
            ft.appendChild(el);
          }
          el.innerHTML = '<span style="color:var(--gold,#9C7A3A)">✦</span> 지금 ' + n + '명이 우주를 관측 중';
        }
      } catch (e) {}
    };
    await beat(); await count();
    setInterval(beat, 60 * 1000 + Math.floor(Math.random() * 5000));
    setInterval(count, 60 * 1000 + Math.floor(Math.random() * 5000));
  } catch (e) {}
})();
</script>
