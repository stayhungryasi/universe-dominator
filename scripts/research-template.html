<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PAGE_TITLE}} · 우주지배자</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
:root, [data-theme="light"] {
  --bg: #FAF6EC; --bg-card: #FFFFFF; --header-bg: rgba(250, 246, 236, 0.95);
  --text: #1A2438; --text-secondary: #525F7E; --text-muted: #8590AA;
  --gold: #9C7A3A; --gold-bg: #F0E6CC;
  --line: #E8DFC9; --line-strong: #C9BC9A;
}
[data-theme="dark"] {
  --bg: #0A0E14; --bg-card: #1C2330; --header-bg: rgba(10, 14, 20, 0.95);
  --text: #FFFFFF; --text-secondary: #B5BFD6; --text-muted: #6F7E9E;
  --gold: #D4A658; --gold-bg: #2A2519;
  --line: #2A3142; --line-strong: #3A4458;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard Variable', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  font-feature-settings: 'tnum', 'ss01'; line-height: 1.6;
  transition: background 0.3s, color 0.3s;
  min-height: 100vh; display: flex; flex-direction: column;
}
.container { max-width: 720px; margin: 0 auto; padding: 0 20px; width: 100%; }

.site-header { background: var(--header-bg); border-bottom: 1px solid var(--line); }
.site-header-inner { max-width: 720px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.brand { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 800; color: var(--text); }
.brand a { text-decoration: none; color: inherit; display: flex; gap: 8px; align-items: center; }
.brand-star { color: var(--gold); }
.brand-tag { font-size: 13px; font-weight: 500; color: var(--text-muted); }
.header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.update-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; background: var(--gold-bg);
  border-radius: 100px; font-size: 12px; font-weight: 700;
  color: var(--gold); font-variant-numeric: tabular-nums;
}
[data-theme="dark"] .update-badge { border: 1px solid rgba(212,166,88,0.3); }
.update-badge::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold); animation: pulse 2s ease-in-out infinite;
}
[data-theme="dark"] .update-badge::before { box-shadow: 0 0 8px var(--gold); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.rate-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 12px; background: var(--bg-card);
  border: 1px solid var(--line); border-radius: 100px;
  font-size: 12px; font-weight: 700; color: var(--text-secondary);
  font-variant-numeric: tabular-nums; letter-spacing: 0.01em;
  white-space: nowrap; text-decoration: none; cursor: pointer;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}
.rate-badge:hover { border-color: var(--gold); }
.rate-badge:hover #usdKrwDisplay, .rate-badge:hover .rate-badge-arrow { color: var(--gold); }
.rate-badge-arrow { font-size: 10px; margin-left: 2px; color: var(--text-muted); opacity: 0.7; transition: color 0.2s, opacity 0.2s; }
.rate-badge:hover .rate-badge-arrow { opacity: 1; }
.rate-badge #usdKrwDisplay { color: var(--text); font-weight: 800; }
@media (max-width: 480px) { .rate-badge { font-size: 11px; padding: 5px 10px; } .update-badge { font-size: 11px; padding: 5px 10px; } }
@media (max-width: 380px) { .update-badge::before { display: none; } }

.theme-toggle {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--line); background: var(--bg-card);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary);
}
.theme-toggle svg { width: 18px; height: 18px; }
.icon-sun { display: none; }
[data-theme="dark"] .icon-moon { display: none; }
[data-theme="dark"] .icon-sun { display: inline; }

.site-nav { position: sticky; top: 0; z-index: 50; background: var(--header-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--line); }
.site-nav-inner { max-width: 720px; margin: 0 auto; display: flex; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
.site-nav-inner::-webkit-scrollbar { display: none; }
.nav-tab { flex-shrink: 0; padding: 14px 18px; font-size: 14px; font-weight: 700; letter-spacing: -0.01em; color: var(--text-muted); text-decoration: none; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
.nav-tab:hover { color: var(--text-secondary); }
.nav-tab.active { color: var(--text); border-bottom-color: var(--gold); }

main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 0; }

.placeholder-card {
  text-align: center;
  padding: 56px 32px;
  border: 1px dashed var(--line-strong);
  border-radius: 16px;
  background: var(--bg-card);
  max-width: 480px;
  width: 100%;
}
.placeholder-icon { font-size: 56px; margin-bottom: 16px; }
.placeholder-eyebrow {
  font-size: 11px; font-weight: 800; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 10px;
}
.placeholder-title {
  font-size: 30px; font-weight: 800; letter-spacing: -0.03em;
  color: var(--text); margin-bottom: 12px;
}
.placeholder-desc { font-size: 14px; color: var(--text-secondary); margin-bottom: 6px; line-height: 1.6; }
.placeholder-note { font-size: 12px; color: var(--text-muted); margin-top: 18px; }

/* ── 리서치 목록 ── */
main.research-main { display: block; align-items: stretch; padding: 36px 0 60px; }
.page-eyebrow { font-size: 11px; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
.page-title { font-size: 30px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 8px; }
.page-desc { font-size: 14px; color: var(--text-secondary); margin-bottom: 6px; }
.gen-label { font-size: 12px; color: var(--text-muted); margin-bottom: 22px; }
.group-tabs { display: flex; gap: 8px; margin: 18px 0 22px; }
.group-tab { padding: 8px 16px; border-radius: 100px; border: 1px solid var(--line); background: var(--bg-card); font-size: 13px; font-weight: 700; color: var(--text-secondary); cursor: pointer; font-family: inherit; }
.group-tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.stock-block { background: var(--bg-card); border: 1px solid var(--line); border-radius: 14px; padding: 18px 20px; margin-bottom: 14px; }
.stock-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
.stock-rank { font-size: 12px; font-weight: 800; color: var(--gold); }
.stock-name { font-size: 16px; font-weight: 800; }
.stock-ticker { font-size: 12px; color: var(--text-muted); }
.art { display: block; padding: 9px 0; border-top: 1px solid var(--line); text-decoration: none; }
.art:hover .art-title { color: var(--gold); }
.art-title { font-size: 13.5px; font-weight: 600; color: var(--text); line-height: 1.45; transition: color 0.15s; }
.art-meta { font-size: 11.5px; color: var(--text-muted); margin-top: 3px; }
.art-orig { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; line-height: 1.4; font-style: italic; }
.art-summary { margin: 7px 0 2px; padding-left: 2px; list-style: none; }
.art-summary li { font-size: 12.5px; color: var(--text-secondary); line-height: 1.55; padding-left: 12px; position: relative; margin-bottom: 3px; }
.art-summary li::before { content: ''; position: absolute; left: 0; top: 8px; width: 4px; height: 4px; border-radius: 50%; background: var(--gold); }
/* ── 주요일정 ── */
.cal-item { display: flex; align-items: flex-start; gap: 14px; background: var(--bg-card); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
.cal-date { min-width: 76px; text-align: center; }
.cal-date .d { font-size: 15px; font-weight: 800; font-variant-numeric: tabular-nums; }
.cal-date .dday { display: inline-block; margin-top: 3px; font-size: 10.5px; font-weight: 800; padding: 2px 8px; border-radius: 100px; background: var(--gold-bg); color: var(--gold); }
.cal-date .dday.today { background: var(--gold); color: #fff; }
.cal-body { flex: 1; }
.cal-title { font-size: 13.5px; font-weight: 600; line-height: 1.5; }
.cal-type { display: inline-block; margin-top: 4px; font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 100px; border: 1px solid var(--line); color: var(--text-muted); }
.cal-type.macro { border-color: var(--gold); color: var(--gold); }
.no-art { font-size: 12.5px; color: var(--text-muted); padding: 6px 0; }
@media (max-width: 480px) { .page-title { font-size: 24px; } .stock-block { padding: 14px 16px; } }

.site-footer { padding: 24px 0 40px; border-top: 1px solid var(--line); text-align: center; }
.footer-brand { display: flex; justify-content: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--text-secondary); }
.footer-link { color: var(--text-secondary); text-decoration: none; font-weight: 700; }
.footer-link:hover { color: var(--gold); }
.footer-divider { color: var(--text-muted); font-weight: 400; }

@media (max-width: 480px) { .nav-tab { padding: 12px 14px; font-size: 13px; } .placeholder-title { font-size: 24px; } }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <div class="brand">
      <a href="index.html"><span class="brand-star">✨</span><span>Stay hungry. ASI</span></a>
      <span class="brand-tag">@stayhungryasi</span>
    </div>
    <div class="header-right">
      <span class="update-badge">{{FETCHED_DATE}}</span>
      <a href="https://finance.naver.com/marketindex/exchangeDetail.naver?marketindexCd=FX_USDKRW"
         target="_blank" rel="noopener" class="rate-badge" title="네이버 실시간 환율 보기">
        USD/KRW <span id="usdKrwDisplay">{{USD_KRW}}</span>
        <span class="rate-badge-arrow" aria-hidden="true">↗</span>
      </a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="테마 전환">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
    </div>
  </div>
</header>

<nav class="site-nav">
  <div class="site-nav-inner container">
    <a href="index.html" class="nav-tab {{ACTIVE_HOME}}">우주지배자</a>
    <a href="latent.html" class="nav-tab {{ACTIVE_LATENT}}">잠재지배자</a>
    <a href="megatrend.html" class="nav-tab {{ACTIVE_MEGA}}">메가트렌드</a>
    <a href="research.html" class="nav-tab {{ACTIVE_RESEARCH}}">리서치</a>
    <a href="community.html" class="nav-tab {{ACTIVE_COMMUNITY}}">커뮤니티</a>
    <a href="my-universe.html" class="nav-tab {{ACTIVE_MY}}">나의우주</a>
  </div>
</nav>

<main class="research-main">
  <div class="container">
    <div class="page-eyebrow">RESEARCH</div>
    <h1 class="page-title">리서치</h1>
    <p class="page-desc">우주지배자 · 잠재지배자 종목의 글로벌 리서치·분석 기사 — 매일 자동 수집.</p>
    <div class="gen-label" id="genLabel"></div>
    <div class="group-tabs">
      <button class="group-tab active" data-g="universe" onclick="setGroup('universe', this)">우주지배자</button>
      <button class="group-tab" data-g="latent" onclick="setGroup('latent', this)">잠재지배자</button>
      <button class="group-tab" data-g="calendar" onclick="setGroup('calendar', this)">주요일정</button>
    </div>
    <div id="list"></div>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-brand">
      <span>✨ Stay hungry. ASI</span>
      <span class="footer-divider">·</span>
      <a href="https://t.me/stayhungryasi" target="_blank" rel="noopener" class="footer-link">t.me/stayhungryasi</a>
    </div>
  </div>
</footer>

<script>
const savedTheme = localStorage.getItem('ud-theme');
if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('ud-theme', next);
}
</script>

<script>
const DATA = {{DATA_JSON}};

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(group) {
  const list = document.getElementById('list');
  const stocks = (DATA.stocks || []).filter(s => s.group === group);
  if (!stocks.length) {
    list.innerHTML = '<div class="no-art">수집된 리서치가 아직 없습니다 — 다음 자동 갱신을 기다려 주세요.</div>';
    return;
  }
  list.innerHTML = stocks.map(s => {
    const arts = (s.articles || []).map(a => {
      const hasKo = a.title_ko && a.title_ko !== a.title;
      const bullets = (a.summary_ko || []).map(b => '<li>' + esc(b) + '</li>').join('');
      return '<a class="art" href="' + esc(a.link) + '" target="_blank" rel="noopener">' +
        '<div class="art-title">' + esc(hasKo ? a.title_ko : a.title) + '</div>' +
        (hasKo ? '<div class="art-orig">' + esc(a.title) + '</div>' : '') +
        (bullets ? '<ul class="art-summary">' + bullets + '</ul>' : '') +
        '<div class="art-meta">' + esc(a.source) + (a.date_label ? ' · ' + esc(a.date_label) : '') + '</div>' +
      '</a>';
    }).join('');
    return '<div class="stock-block">' +
      '<div class="stock-head">' +
        (s.rank ? '<span class="stock-rank">' + esc(s.rank) + '위</span>' : '') +
        '<span class="stock-name">' + esc(s.name) + '</span>' +
        '<span class="stock-ticker">' + esc(s.ticker) + '</span>' +
      '</div>' +
      (arts || '<div class="no-art">최근 2주 내 수집된 기사 없음</div>') +
    '</div>';
  }).join('');
}

function renderCalendar() {
  const list = document.getElementById('list');
  const evs = (DATA.calendar && DATA.calendar.events) || [];
  if (!evs.length) {
    list.innerHTML = '<div class="no-art">수집된 일정이 아직 없습니다 — 다음 자동 갱신을 기다려 주세요.</div>';
    return;
  }
  const today = new Date(new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' }));
  const typeLabel = { macro: 'FOMC·매크로', earnings: '실적 발표', event: '이벤트' };
  list.innerHTML = evs.map(e => {
    const d = new Date(e.date);
    const diff = Math.round((d - today) / 86400000);
    const dday = diff === 0 ? 'TODAY' : (diff > 0 ? 'D-' + diff : 'D+' + Math.abs(diff));
    const md = (d.getMonth() + 1) + '/' + d.getDate();
    return '<div class="cal-item">' +
      '<div class="cal-date"><div class="d">' + md + '</div>' +
      '<span class="dday' + (diff === 0 ? ' today' : '') + '">' + dday + '</span></div>' +
      '<div class="cal-body"><div class="cal-title">' + esc(e.title) + '</div>' +
      '<span class="cal-type ' + esc(e.type || '') + '">' + (typeLabel[e.type] || '일정') + '</span></div>' +
    '</div>';
  }).join('');
}

function setGroup(g, btn) {
  document.querySelectorAll('.group-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (g === 'calendar') renderCalendar(); else render(g);
}

document.addEventListener('DOMContentLoaded', function () {
  if (DATA.generated_label) {
    document.getElementById('genLabel').textContent = '마지막 수집: ' + DATA.generated_label + ' KST';
  }
  render('universe');
});
</script>
</body>
</html>
