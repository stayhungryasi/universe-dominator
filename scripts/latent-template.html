<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>잠재지배자 · 우주지배자</title>
<meta name="description" content="TOP 20 외 강력한 모멘텀을 보유한 차세대 후보 종목">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
:root, [data-theme="light"] {
  --bg: #FAF6EC; --bg-card: #FFFFFF; --header-bg: rgba(250, 246, 236, 0.95);
  --text: #1A2438; --text-secondary: #525F7E; --text-muted: #8590AA;
  --gold: #9C7A3A; --gold-bg: #F0E6CC;
  --line: #E8DFC9; --line-strong: #C9BC9A;
  --up: #16A085; --down: #C0392B;
}
[data-theme="dark"] {
  --bg: #0A0E14; --bg-card: #1C2330; --header-bg: rgba(10, 14, 20, 0.95);
  --text: #FFFFFF; --text-secondary: #B5BFD6; --text-muted: #6F7E9E;
  --gold: #D4A658; --gold-bg: #2A2519;
  --line: #2A3142; --line-strong: #3A4458;
  --up: #2ECC71; --down: #E74C3C;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Pretendard Variable', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  font-feature-settings: 'tnum', 'ss01';
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}

.container { max-width: 720px; margin: 0 auto; padding: 0 20px; }

/* 헤더 */
.site-header { background: var(--header-bg); border-bottom: 1px solid var(--line); }
.site-header-inner { max-width: 720px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.brand { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 800; color: var(--text); }
.brand a { text-decoration: none; color: inherit; display: flex; gap: 8px; align-items: center; }
.brand-star { color: var(--gold); }
.brand-tag { font-size: 13px; font-weight: 500; color: var(--text-muted); }
.header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.theme-toggle {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--line); background: var(--bg-card);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary);
}
.theme-toggle svg { width: 18px; height: 18px; }
.icon-sun { display: none; }
[data-theme="dark"] .icon-moon { display: none; }
[data-theme="dark"] .icon-sun { display: inline; }

/* 네비게이션 */
.site-nav {
  position: sticky; top: 0; z-index: 50;
  background: var(--header-bg);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--line);
}
.site-nav-inner {
  max-width: 720px; margin: 0 auto;
  display: flex; gap: 0; overflow-x: auto;
  scrollbar-width: none; -ms-overflow-style: none;
}
.site-nav-inner::-webkit-scrollbar { display: none; }
.nav-tab {
  flex-shrink: 0; padding: 14px 18px;
  font-size: 14px; font-weight: 700; letter-spacing: -0.01em;
  color: var(--text-muted); text-decoration: none;
  border-bottom: 2px solid transparent;
  transition: all 0.2s; white-space: nowrap;
}
.nav-tab:hover { color: var(--text-secondary); }
.nav-tab.active { color: var(--text); border-bottom-color: var(--gold); }

/* 페이지 헤딩 */
.page-hero { padding: 40px 0 20px; }
.page-eyebrow {
  font-size: 11px; font-weight: 800; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 8px;
}
.page-title { font-size: 38px; font-weight: 800; letter-spacing: -0.03em; color: var(--text); margin-bottom: 10px; }
.page-desc { font-size: 14px; font-weight: 500; color: var(--text-muted); max-width: 600px; }

/* History 버튼 */
.section-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 20px 0 16px; }
.history-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 7px 14px; background: var(--bg-card);
  border: 1px solid var(--line); border-radius: 100px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.02em;
  color: var(--text-secondary); text-decoration: none;
  transition: all 0.2s; white-space: nowrap;
}
.history-btn:hover { border-color: var(--gold); color: var(--gold); }
.history-btn-arrow { font-size: 11px; opacity: 0.7; transition: transform 0.2s; }
.history-btn:hover .history-btn-arrow { transform: translateX(2px); opacity: 1; }

/* 잠재지배자 카드 */
.latent-grid { display: grid; gap: 12px; padding-bottom: 60px; }
@media (min-width: 720px) { .latent-grid { grid-template-columns: 1fr 1fr; } }

.latent-card {
  background: var(--bg-card); border: 1px solid var(--line);
  border-radius: 12px; padding: 18px 20px;
  transition: border-color 0.2s, transform 0.2s;
}
.latent-card:hover { border-color: var(--line-strong); transform: translateY(-1px); }
.latent-card.star {
  background: linear-gradient(135deg, var(--gold-bg), var(--bg-card));
  border-color: var(--gold);
}
[data-theme="dark"] .latent-card.star { border-color: var(--gold); }

.latent-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.latent-badge {
  font-size: 10px; font-weight: 800; letter-spacing: 0.08em;
  padding: 3px 8px; border-radius: 4px;
}
.latent-badge.normal { background: var(--bg); color: var(--text-secondary); }
[data-theme="light"] .latent-badge.normal { background: var(--bg); }
.latent-badge.new { background: var(--up); color: white; }
.latent-badge.star-badge { background: var(--gold); color: white; }
[data-theme="dark"] .latent-badge.star-badge { color: var(--bg); }

.latent-name {
  display: block; font-size: 22px; font-weight: 800;
  letter-spacing: -0.03em; color: var(--text); margin-bottom: 4px;
  text-decoration: none; transition: color 0.2s; cursor: pointer;
}
.latent-name:hover { color: var(--gold); }

.latent-ticker {
  font-size: 13px; color: var(--text-muted); font-weight: 600;
  display: flex; align-items: center; gap: 6px; margin-bottom: 14px;
}
.flag-img {
  width: 1.4em; height: 1em; margin-right: 5px;
  vertical-align: -0.12em; border-radius: 2px;
  object-fit: cover; box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
  background: #ddd; display: inline-block;
}
.latent-theme {
  display: inline-block; font-size: 12px; font-weight: 700;
  padding: 4px 10px; background: var(--gold-bg); color: var(--gold);
  border-radius: 100px; margin-bottom: 10px;
}
.latent-story {
  font-size: 13.5px; line-height: 1.65; color: var(--text-secondary);
  margin-bottom: 16px; font-weight: 500;
}
.latent-stats { display: flex; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--line); }
.latent-stat-label { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 2px; }
.latent-stat-val { font-size: 15px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; }
.latent-stat-val.gain { color: var(--up); }

/* 푸터 */
.site-footer { padding: 32px 0 60px; border-top: 1px solid var(--line); text-align: center; margin-top: 40px; }
.footer-brand { display: flex; justify-content: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; }
.footer-link { color: var(--text-secondary); text-decoration: none; font-weight: 700; transition: color 0.2s; }
.footer-link:hover { color: var(--gold); }
.footer-divider { color: var(--text-muted); font-weight: 400; }
.footer-source { font-size: 11px; color: var(--text-muted); }

@media (max-width: 480px) {
  .page-title { font-size: 28px; }
  .nav-tab { padding: 12px 14px; font-size: 13px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <div class="brand">
      <a href="index.html"><span class="brand-star">✨</span><span>Stay hungry. ASI</span></a>
      <span class="brand-tag">@stayhungryasi</span>
    </div>
    <div class="header-right">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="테마 전환">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
    </div>
  </div>
</header>

<nav class="site-nav">
  <div class="site-nav-inner container">
    <a href="index.html" class="nav-tab">우주지배자</a>
    <a href="latent.html" class="nav-tab active">잠재지배자</a>
    <a href="megatrend.html" class="nav-tab">메가트렌드</a>
    <a href="research.html" class="nav-tab">리서치</a>
    <a href="community.html" class="nav-tab">커뮤니티</a>
    <a href="my-universe.html" class="nav-tab">나의우주</a>
  </div>
</nav>

<main class="container">
  <section class="page-hero">
    <div class="page-eyebrow">Next Universe</div>
    <h1 class="page-title">잠재지배자</h1>
    <p class="page-desc">TOP 20 외 강력한 모멘텀을 보유한 차세대 우주지배자 후보. AI·신산업 가치사슬을 중심으로 큐레이션.</p>
  </section>

  <div class="section-head">
    <div></div>
    <a href="history-latent.html" class="history-btn">History <span class="history-btn-arrow">→</span></a>
  </div>

  <div class="latent-grid" id="latentGrid"></div>
</main>

<footer class="site-footer container">
  <div class="footer-brand">
    <span>✨ Stay hungry. ASI</span>
    <span class="footer-divider">·</span>
    <a href="https://t.me/stayhungryasi" target="_blank" rel="noopener" class="footer-link">t.me/stayhungryasi</a>
  </div>
  <p class="footer-source">Source: <a href="https://companiesmarketcap.com" target="_blank" rel="noopener" class="footer-link">companiesmarketcap.com</a></p>
</footer>

<script>
const savedTheme = localStorage.getItem('ud-theme');
if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('ud-theme', next);
}

const DATA = {{DATA_JSON}};

const STOCK_URL_OVERRIDES = {
  'GOOG': 'https://www.google.com/finance/quote/GOOGL:NASDAQ',
  'GOOGL': 'https://www.google.com/finance/quote/GOOGL:NASDAQ',
  'BRK.A': 'https://www.google.com/finance/quote/BRK.A:NYSE',
  'BRK-A': 'https://www.google.com/finance/quote/BRK.A:NYSE',
  'BRK.B': 'https://www.google.com/finance/quote/BRK.B:NYSE',
  'BRK-B': 'https://www.google.com/finance/quote/BRK.B:NYSE',
};
const US_EXCHANGE = {
  NVDA:'NASDAQ',AAPL:'NASDAQ',MSFT:'NASDAQ',GOOGL:'NASDAQ',GOOG:'NASDAQ',AMZN:'NASDAQ',
  META:'NASDAQ',TSLA:'NASDAQ',AVGO:'NASDAQ',ASML:'NASDAQ',AMD:'NASDAQ',MU:'NASDAQ',
  ADBE:'NASDAQ',NFLX:'NASDAQ',COST:'NASDAQ',ARM:'NASDAQ',PLTR:'NASDAQ',ANET:'NASDAQ',
  MRVL:'NASDAQ',
  JPM:'NYSE',V:'NYSE',WMT:'NYSE',UNH:'NYSE',JNJ:'NYSE',XOM:'NYSE',TSM:'NYSE',LLY:'NYSE',
  ORCL:'NYSE',DELL:'NYSE',VRT:'NYSE',GEV:'NYSE',
};
const GOOGLE_EXCHANGE = {'T':'TYO','HK':'HKG','SS':'SHA','SZ':'SHE','L':'LON','PA':'EPA','DE':'ETR','SW':'SWX','AS':'AMS','SR':'TADAWUL','TW':'TPE'};

function stockUrl(ticker, name) {
  const t = (ticker||'').trim(); const tU = t.toUpperCase();
  if (tU in STOCK_URL_OVERRIDES) return STOCK_URL_OVERRIDES[tU];
  if (t.endsWith('.KS')||t.endsWith('.KQ')) return `https://finance.naver.com/item/main.naver?code=${t.split('.')[0]}`;
  if (t.includes('.')) {
    const parts = t.split('.'); const ex = GOOGLE_EXCHANGE[parts[parts.length-1].toUpperCase()];
    if (ex) return `https://www.google.com/finance/quote/${parts[0]}:${ex}`;
  }
  if (t) { const ex = US_EXCHANGE[tU] || 'NASDAQ'; return `https://www.google.com/finance/quote/${tU}:${ex}`; }
  return `https://www.google.com/search?q=${encodeURIComponent((name||'')+' stock')}`;
}

function flagFromEmoji(emoji) {
  if (!emoji || typeof emoji !== 'string') return '';
  const chars = [...emoji]; if (chars.length < 2) return '';
  const c1 = chars[0].codePointAt(0); const c2 = chars[1].codePointAt(0);
  if (c1 < 0x1F1E6 || c1 > 0x1F1FF || c2 < 0x1F1E6 || c2 > 0x1F1FF) return '';
  const a = String.fromCharCode(97 + (c1 - 0x1F1E6));
  const b = String.fromCharCode(97 + (c2 - 0x1F1E6));
  return `<img class="flag-img" src="https://flagcdn.com/${a}${b}.svg" alt="${a}${b}" loading="lazy" onerror="this.style.display='none'" />`;
}

const fmtMC = (mc) => mc >= 1000 ? '$' + (mc/1000).toFixed(2) + 'T' : '$' + Math.round(mc) + 'B';

const latentGrid = document.getElementById('latentGrid');
if (DATA.latent && DATA.latent.length > 0) {
  latentGrid.innerHTML = DATA.latent.map((c) => {
    const star = c.is_star ? 'star' : '';
    let badge;
    if (c.is_star) badge = '<span class="latent-badge star-badge">★ 다음 우주지배자</span>';
    else if (c.is_new) badge = '<span class="latent-badge new">NEW</span>';
    else badge = `<span class="latent-badge normal">Rank ${c.rank}</span>`;
    return `
      <div class="latent-card ${star}">
        <div class="latent-header">${badge}</div>
        <a href="${stockUrl(c.ticker, c.name)}" target="_blank" rel="noopener" class="latent-name">${c.name}</a>
        <div class="latent-ticker">
          <span>${flagFromEmoji(c.country)}</span>
          <span>${c.ticker}</span>
        </div>
        <div class="latent-theme">${c.theme}</div>
        <div class="latent-story">${c.story}</div>
        <div class="latent-stats">
          <div>
            <div class="latent-stat-label">시가총액</div>
            <div class="latent-stat-val">${fmtMC(c.mc)}</div>
          </div>
          <div style="text-align:right;">
            <div class="latent-stat-label">1년 수익률</div>
            <div class="latent-stat-val gain">+${c.momentum_1y}%</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}
</script>
</body>
</html>
